name: authenticator
description: "A secure cross-platform authentication app"
publish_to: 'none'

version: 0.1.2+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  flutter_secure_storage: ^9.2.4
  local_auth: ^3.0.1
  mobile_scanner: ^6.0.2
  pointycastle: ^3.9.1
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/