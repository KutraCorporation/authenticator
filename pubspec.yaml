name: authenticator
description: "A secure cross-platform authentication app"
publish_to: 'none'

version: 0.1.13+13

environment:
  sdk: ">=3.3.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter

  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  flutter_secure_storage: ^10.3.1
  local_auth: ^2.1.0
  mobile_scanner: ^6.0.0
  pointycastle: ^3.9.1
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
